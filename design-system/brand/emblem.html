<!-- @dsCard group="Brand" title="Emblem & dividers" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lanna · Emblem</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Chonburi&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap');
:root{--bg:#efe3cf;--bg-2:#e1cfb1;--paper:#fbf7ef;--ink:#2e2113;--muted:#8a7559;
  --gold:#c8962b;--gold-deep:#a8791c;--gold-soft:#e7c878;--border:rgba(46,33,19,.16);
  --display:'Chonburi','Noto Sans Thai',Georgia,serif;--sans:'Noto Sans Thai',system-ui,sans-serif;}
*{box-sizing:border-box}
body{margin:0;font-family:var(--sans);color:var(--ink);min-height:100vh;padding:34px;display:flex;gap:26px;flex-wrap:wrap;align-items:flex-start;
  background:radial-gradient(125% 90% at 50% -10%,#f8efdc 0%,var(--bg) 48%,var(--bg-2) 100%);}
.card{background:var(--paper);border:1px solid var(--border);border-radius:14px;padding:24px;box-shadow:0 10px 30px rgba(74,50,22,.16);text-align:center}
.lbl{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:14px}
.lock{display:flex;align-items:center;gap:10px}
.wm{font-family:var(--display);font-size:24px}
.gd{color:var(--gold-deep)}
.gold-rule{position:relative;height:1px;width:230px;margin:26px auto 6px;background:linear-gradient(90deg,transparent,var(--gold) 18%,var(--gold) 82%,transparent);opacity:.85}
.gold-rule::after{content:"";position:absolute;left:50%;top:50%;width:8px;height:8px;transform:translate(-50%,-50%) rotate(45deg);background:var(--gold);box-shadow:0 0 0 2px var(--paper)}
</style></head>
<body>
<div class="card">
  <svg width="92" height="92" viewBox="0 0 32 32" fill="none">
    <circle cx="16" cy="16" r="14.6" stroke="var(--gold)" stroke-width="1.5"/>
    <path d="M16 4.2 L27.8 16 L16 27.8 L4.2 16 Z" stroke="var(--gold-deep)" stroke-width="1.1"/>
    <path d="M16 8.5 q4.4 7.5 0 15 q-4.4 -7.5 0 -15z" fill="var(--gold)" opacity="0.9"/>
    <circle cx="16" cy="16" r="2.1" fill="var(--paper)"/>
  </svg>
  <div class="lbl">LannaEmblem — roundel + diamond + leaf</div>
</div>
<div class="card">
  <div class="lock">
    <svg width="34" height="34" viewBox="0 0 32 32" fill="none">
      <circle cx="16" cy="16" r="14.6" stroke="var(--gold)" stroke-width="1.5"/>
      <path d="M16 4.2 L27.8 16 L16 27.8 L4.2 16 Z" stroke="var(--gold-deep)" stroke-width="1.1"/>
      <path d="M16 8.5 q4.4 7.5 0 15 q-4.4 -7.5 0 -15z" fill="var(--gold)" opacity="0.9"/>
      <circle cx="16" cy="16" r="2.1" fill="var(--paper)"/>
    </svg>
    <div style="text-align:left">
      <div class="wm">เชียงใหม่ <span class="gd">Transit</span></div>
      <div style="font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-top:2px">Chiang Mai · ผังเมืองรถไฟฟ้า</div>
    </div>
  </div>
  <div class="gold-rule"></div>
  <div class="lbl">Brand lockup + gold-rule divider</div>
</div>
</body></html>
